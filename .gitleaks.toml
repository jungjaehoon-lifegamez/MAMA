# Gitleaks Configuration
# https://github.com/gitleaks/gitleaks

[extend]
useDefault = true

# Paths to ignore
[allowlist]
description = "Project allowlist for non-secret placeholders and generated lockfiles"
paths = [
  '''pnpm-lock\.yaml''',
  '''package-lock\.json''',
  '''\.env\.example''',
]
regexes = [
  '''YOUR_.*_TOKEN_HERE''',
]
